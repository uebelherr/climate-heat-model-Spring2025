// ─── Seedable MT19937 RNG (replaces _rng.random()) ───────────────────────────
// Produces identical output to C++ std::mt19937 given the same seed.
// All arithmetic uses bitwise ops to stay in 32-bit unsigned integer space.
class MT19937 {
  constructor(seed = Date.now()) {
    this.mt = new Uint32Array(624);
    this.index = 624;
    this.mt[0] = seed >>> 0;
    for (let i = 1; i < 624; i++) {
      this.mt[i] = (Math.imul(1812433253, (this.mt[i-1] ^ (this.mt[i-1] >>> 30))) + i) >>> 0;
    }
  }
  _generate() {
    for (let i = 0; i < 624; i++) {
      const y = ((this.mt[i] & 0x80000000) + (this.mt[(i+1) % 624] & 0x7fffffff)) >>> 0;
      this.mt[i] = this.mt[(i + 397) % 624] ^ (y >>> 1);
      if (y & 1) this.mt[i] ^= 0x9908b0df;
    }
    this.index = 0;
  }
  nextUint32() {
    if (this.index >= 624) this._generate();
    let y = this.mt[this.index++];
    y ^= y >>> 11;
    y ^= (y << 7) & 0x9d2c5680;
    y ^= (y << 15) & 0xefc60000;
    y ^= y >>> 18;
    return y >>> 0;
  }
  random() { return this.nextUint32() / 4294967296; }
  randomInt(n) { return Math.floor(this.random() * n); }
}

// Sources: U.S. Census Bureau 2020 Decennial Census; AZ OEO 2025-2060 Medium Series
function maricopaPop(yr){
const pts=[[2020,4420568],[2025,4787790],[2030,5200391],[2060,6529107],[2100,8300728]];
if(yr<=pts[0][0]) return pts[0][1];
if(yr>=pts[pts.length-1][0]) return pts[pts.length-1][1];
for(let i=0;i<pts.length-1;i++){
if(yr>=pts[i][0]&&yr<=pts[i+1][0]){
const t=(yr-pts[i][0])/(pts[i+1][0]-pts[i][0]);
return Math.round(pts[i][1]+(pts[i+1][1]-pts[i][1])*t);
}
}

// === CMIP6-ALIGNED WARMING TRAJECTORY INTERPOLATION ===
// Uses piecewise linear interpolation
// through IPCC AR6 CMIP6 ensemble median warming fractions at 20-year waypoints.
// Each scenario has a warmingCurve: [[year, fraction], ...] where fraction (0–1)
// represents what share of the scenario's total 2100 warming has arrived by that year.
// SSP1-2.6 (optimistic): front-loaded — most warming arrives by mid-century, then plateaus.
// SSP2-4.5 (moderate): accelerates through ~2060, then gradually decelerates.
// SSP5-8.5 (severe): sustained acceleration — more warming in the second half-century.
// Baseline: all zeros (no warming).
// This produces scenario-specific non-linear trajectories that match CMIP6 ensemble medians
// to within ±0.1°C at each waypoint.
function interpF(curve,yr){
if(yr<=curve[0][0])return curve[0][1];
if(yr>=curve[curve.length-1][0])return curve[curve.length-1][1];
for(let i=0;i<curve.length-1;i++){
if(yr>=curve[i][0]&&yr<=curve[i+1][0]){
const t=(yr-curve[i][0])/(curve[i+1][0]-curve[i][0]);
return curve[i][1]+(curve[i+1][1]-curve[i][1])*t;
}
}
return curve[curve.length-1][1];
}

React.createElement(SectionHead,null,"Why Maricopa County?"),
React.createElement('p',{style:prose},"Maricopa County, Arizona is one of the fastest-warming major cities on Earth. Sitting in the Sonoran Desert at 1,086 ft elevation, it already experiences conditions that challenge the limits of human habitability — and climate projections suggest it will continue to push those limits."),
React.createElement('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,margin:"24px 0"}},

React.createElement(SectionHead,null,"The Urban Heat Island"),
React.createElement('p',{style:prose},"Maricopa County's asphalt, concrete, and sprawling development trap heat long after sunset. Nighttime temperatures rarely drop below 90°F in summer — a phenomenon called the urban heat island effect — which prevents the body's natural overnight recovery from heat stress.",React.createElement(Ref,{n:[1,14]})),
React.createElement(KeyConcept,{term:"Urban Heat Island",color:"#8C1D40"},"When cities replace natural land cover with heat-absorbing surfaces, they create localized warming zones 2–8°F hotter than surrounding rural areas.",React.createElement(Ref,{n:14}))
);

"// CMIP6-aligned warming trajectory interpolation\nfunction interpF(curve, yr) {\n  if (yr <= curve[0][0]) return curve[0][1];\n  if (yr >= curve[curve.length-1][0]) return curve[curve.length-1][1];\n  for (let i = 0; i < curve.length-1; i++) {\n    if (yr >= curve[i][0] && yr <= curve[i+1][0]) {\n      const t = (yr - curve[i][0]) / (curve[i+1][0] - curve[i][0]);\n      return curve[i][1] + (curve[i+1][1] - curve[i][1]) * t;\n    }\n  }\n  return curve[curve.length-1][1];\n}\n\nfunction project(scenario, year) {\n  const s = SCENARIOS[scenario];\n  const f = interpF(s.warmingCurve, year);\n  return MONTHS.map((m, i) => ({\n    month: m,\n    high:  +(BASE.high[i] + s.tempD * f).toFixed(1),\n    low:   +(BASE.low[i] + s.tempD * f).toFixed(1),\n    precip:+(Math.max(0, BASE.precip[i] * (1 + s.precipD * f))).toFixed(2),\n    sun:   BASE.sun[i],\n    heat:  Math.min(31, Math.round(BASE.heat[i] * (1 + f * (s.tempD / 3.5)))),\n  }));\n}"

"// Climate model inputs\nconst data = project(scenario, year);\nconst totalHeatDays = data.reduce((a, d) => a + d.heat, 0);\nconst warming = tempD * interpF(s.warmingCurve, year);\n\n// Base mortality model\nconst BASE_DEATHS_2020 = 687;\nconst BASE_HEAT_DAYS_2020 = 107;\nconst additionalHeatDays = Math.max(0, totalHeatDays - BASE_HEAT_DAYS_2020);\nconst warmingMultiplier = Math.pow(1.04, warming);\nconst rawDeaths = Math.round((BASE_DEATHS_2020 + additionalHeatDays * 3.2) * warmingMultiplier);\n\n// Coverage-based Hill dose-response policy model\n// E(c) = Emax * c^n / (K^n + c^n)  — diminishing returns\nconst hillEfficacy = (c, {Emax, K, n}) => c <= 0 ? 0 : Emax * c**n / (K**n + c**n);\nconst coolingReduction = hillEfficacy(COVERAGE.cooling[coolingCenters], HILL.cooling);\nconst hydrationReduction = hillEfficacy(COVERAGE.hydration[hydrationStations], HILL.hydration);\nconst outreachReduction = hillEfficacy(COVERAGE.outreach[outreach], HILL.outreach);\n// Multiplicative combination — no artificial cap\nconst totalReductionPct = 1 - (1-coolingReduction) * (1-hydrationReduction) * (1-outreachReduction);\nconst preventedDeaths = Math.round(rawDeaths * totalReductionPct);\nconst finalDeaths = rawDeaths - preventedDeaths;\n\n// Cost-effectiveness\nconst costPerLifeSaved = preventedDeaths > 0\n  ? ((totalCost * 1000000) / preventedDeaths / 1000).toFixed(0)\n  : \"—\";"

{name:"indoorTemp",val:"per-agent state, 65–Toutdoor+5 °F",note:"Explicit indoor temperature for each housed agent, updated every daytime and nighttime sub-phase via first-order thermal dynamics: T_indoor += coupling×(T_outdoor−T_indoor) − AC_cooling. Unsheltered agents: indoorTemp = outdoor temp (coupling=1.0). Initialized at 72°F (sheltered) or ~0.82×Tstart+14 (precarious). [40]"},
{name:"THERMAL.sheltered.coupling",val:"0.08",note:"Low thermal coupling for well-insulated sheltered homes — indoor temp changes slowly in response to outdoor temperature. [40]"},
{name:"THERMAL.precarious.baseCoupling",val:"0.18 × (1 + precRate×0.5)",note:"Higher thermal coupling for precarious housing; district-dependent building quality modifier increases coupling in districts with older/poorly-insulated housing stock. [40]"},
{name:"AC cooling",val:"min(3.0, max(0, T_indoor−72) × 0.4) × (1 − acStrain×0.7)",note:"AC cooling rate proportional to indoor-setpoint differential (setpoint=72°F), capped at 3.0°F/tick. AC capacity degrades above 115°F outdoor via a linear ramp: strain = min(1.0, (T−115)×0.08), giving AC_cool = max_cool×(1−strain×0.7). At 120°F strain=0.40 (28% reduction); at 127.5°F strain=1.0 (70% maximum, then capped). The 70% maximum is only reached at T≥127.5°F — not per-degree. During blackout, AC cooling = 0. [40]"},
{name:"housingVulnMult",val:"unsheltered=3.0×, precarious+vuln=1.6×, sheltered+vuln=1.3×",note:"Housing-aware vulnerability multiplier applied to heat accumulation rate. Unsheltered agents face 3.0× heat sensitivity reflecting continuous outdoor exposure. Precarious-housing vulnerable agents retain the original 1.6× multiplier. Sheltered vulnerable agents get a reduced 1.3× (AC provides partial protection)."},
{name:"housingHeatMult",val:"unsheltered=1.5×, precarious=1.15×, sheltered=1.0×",note:"Additional heat accumulation multiplier reflecting 24/7 outdoor exposure (unsheltered) vs. partial indoor relief (precarious) vs. full AC (sheltered). During blackout, sheltered agents become functionally precarious (lose AC). [38]"},
{name:"recoveryRate",val:"sheltered=0.003, precarious=0.001, unsheltered=0.0005 (base; degraded by AC strain)",note:"Heat recovery rate per cool-day tick. Sheltered agents recover fully via AC; precarious agents recover slowly (inadequate cooling); unsheltered agents barely recover. Above 115°F, AC strain degrades recovery: sheltered loses up to 60% of recovery per degree, precarious up to 80%. Recovery floor = 0.0002/tick (never zero). [25,27]"},
{name:"housingDeathMult",val:"unsheltered=2.5×, precarious=1.3×, sheltered=1.0×",note:"Death-zone fractional death rate multiplier. Unsheltered agents who reach the death zone face 2.5× the baseFracDeathRate, reflecting that ~45% of Maricopa County heat deaths are among unsheltered individuals despite comprising <1% of population. [38,39]"},
{name:"nightTemp",val:"dayToTemp(day, monthlyLows)",note:"Nighttime low temperature interpolated from climate model monthly low curve using the same smooth interpolation as daytime highs. Maricopa County summer lows range from 77°F (June) to 84°F (July) at baseline, rising with scenario warming. [41]"},
{name:"Night recovery (sheltered)",val:"−0.004 (indoor<76°F), −0.002 (76–82°F), −0.001 (≥82°F)",note:"Overnight heat recovery for sheltered agents is now driven by indoor temperature rather than fixed outdoor thresholds. AC maintains cool indoor temps on most nights; recovery degrades only when indoor temp rises (hot nights, AC strain, or blackout). During blackout, thermal lag buffers indoor temp rise — well-insulated homes provide hours of protection. [40,41]"},
{name:"Night accumulation (precarious)",val:"+rate (≥80°F), 0 (75–80°F), −0.001 (<75°F)",note:"Precarious agents have no AC; indoor temps track outdoor with thermal lag. On hot nights (≥80°F) heat continues accumulating. Only cool nights (<75°F) allow any recovery through open windows. [40,41]"},
{name:"Night accumulation (unsheltered)",val:"+rate (≥75°F), −0.0003 (65–75°F), −0.0008 (<65°F)",note:"Unsheltered agents are fully exposed to outdoor nighttime temperatures. Accumulate heat on any warm night (≥75°F). Even cool nights provide only minimal recovery. [38,41,42]"},
{name:"baseFracDeathRate (nighttime)",val:"0.00000084 × housingDeathMult × suscDeathMult per agent-tick",note:"Overnight death rate in the nighttime death zone. Lower than daytime (0.00000118) because overnight period has less physical exertion, but still contributes ~40% of total fractional mortality due to prolonged exposure without physiological recovery. During nighttime blackout: 0.00000210 × housingDeathMult × suscDeathMult. [41,42]"},
{name:"baseFracDeathRate (night-shift)",val:"0.00000073 × housingDeathMult × suscDeathMult per agent-tick",note:"Death rate for night-shift workers at their workplace during the nighttime phase. Lower than standard nighttime (0.00000084) because night-shift workers are assumed active and alert at their workplace, with coworker presence providing some protective effect. During nighttime blackout: 0.00000183 × housingDeathMult × suscDeathMult (≈2.51× normal — calibrated independently; the 0.00000183/0.00000073 pair was set to match observed night-shift mortality risk, not derived as an exact 2.5× multiple). Coworker rescue chance = 0.25 × mobilityMod. [17,41]"},
{name:"heatStreak",val:"0–∞ (consecutive days at heat ≥ 0.65)",note:"Counter tracking consecutive days each agent has been at heat ≥ 0.65 (stressed or critical). Increments at end of each full day-night tick. Resets to 0 when agent recovers to healthy (heat < 0.3). If agent is between 0.3–0.65, streak holds (not compounding but not recovered). Used by heatWaveMult. [43]"},
{name:"heatWaveMult",val:"1.0 + min(0.3, max(0, heatStreak − 4) × 0.05)",note:"Multi-day cumulative heat stress multiplier. No effect for streaks ≤ 4 days. After 4 days: +5% per additional day, capped at 1.3× (30% increase at 10+ days). Applied to both daytime heat accumulation rate and nighttime accumulation for precarious/unsheltered agents. Models the documented heat wave duration effect: sustained consecutive hot days cause progressive thermoregulatory degradation. The 4-day threshold and modest effect size reflect U.S. Southwest findings where AC prevalence and acclimatization reduce the wave effect vs. other regions. [43]"},
{name:"isolated",val:"boolean; ~35% of vulnerable agents",note:"Social isolation flag: ~35% of vulnerable agents are socially isolated (living alone, limited regular social contact). All unsheltered agents can be isolated; precarious and sheltered vulnerable agents can be isolated. Non-vulnerable agents are never isolated. Source: Klinenberg (2002) Chicago heat wave analysis; Harlan et al. (2011) Maricopa County case study. [44]"},
{name:"Isolation → help-seeking",val:"50% chance of NOT seeking infrastructure when critical",note:"Isolated critical agents have only a 50% per-tick chance of navigating toward cooling centers or hydration stations (non-isolated: 100%). Models reduced awareness of available services, reluctance to leave home, and absence of social cues that trigger help-seeking behavior. [44]"},
{name:"Isolation → outreach",val:"outreach probability halved (0.0015 vs 0.003 per tier)",note:"Isolated agents are contacted by outreach programs at half the probability of non-isolated agents. Outreach uses a two-tier decay model: Tier 1 (one-time contact, 3-day decay) provides reduced protection (0.40-0.50) and rescue (day 0.20/0.10, night 0.10/0.05). Tier 2 (enrolled via 3+ contacts) provides persistent full benefit (protection 0.30-0.35, rescue day 0.30/0.15, night 0.15/0.08). [21,23,44]"},
{name:"Isolation → rescue",val:"daytime 0.15 (vs 0.3); nighttime 0.08 (vs 0.15)",note:"Isolated agents have tier-dependent rescue probability. Enrolled (tier 2): 0.15 day / 0.08 night. One-time active (tier 1): 0.10 day / 0.05 night. Mobility modifier (x0.6) applies on top. [21,23,44]"},
{name:"hotDaysSeason",val:"0–∞ (sim-level counter, cumulative days ≥ 100°F)",note:"Sim-level counter tracking the cumulative number of days with daytime temperature ≥ 100°F in the current simulation year. Increments once per tick when dailyTemp ≥ 100. Does not reset mid-year. Used by acclimMult to model population-level physiological acclimatization. [45]"},
{name:"acclimMult",val:"1.0 + 0.4 × max(0, 1 − hotDaysSeason / 21)",note:"Early-season acclimatization multiplier applied to both daytime and nighttime heat accumulation. Decays from 1.4× (season's first hot day, no acclimatization) to 1.0× (fully acclimatized after 21 cumulative hot days). At hotDaysSeason=7: 1.27×; at 14: 1.13×; at 21+: 1.0×. Models documented ~3-week physiological adaptation (vasodilation, plasma volume, sweat efficiency). First heat wave of season is ~40% more dangerous than equivalent late-season event. Source: Anderson & Bell (2011). [45]"},
{name:"MONSOON_BUMP",val:"[0,0,0,0,0,0,3,5,4,0,0,0] °F by month",note:"Monthly effective temperature increase due to monsoon humidity. July: +3°F, August: +5°F (peak monsoon), September: +4°F. All other months: 0. Applied to daytime localHeat (all agents) and nighttime effectiveNightTemp (precarious/unsheltered only — AC dehumidifies for sheltered). Models the heat index elevation caused by dewpoints exceeding 60°F during monsoon season. [46]"},
{name:"effectiveNightTemp",val:"nightTemp + monsoonBump",note:"Humidity-adjusted nighttime temperature used for precarious and unsheltered agent threshold comparisons. During monsoon (Jul–Sep), nighttime effective temperature is 3–5°F higher than dry-bulb, making hot-night accumulation thresholds easier to trigger. Sheltered agents use raw nightTemp at night (AC dehumidifies). [46]"},

...[
{name:"baseFracDeathRate (normal)",val:"0.00000118 × housingDeathMult × suscDeathMult per agent-tick",note:"Counterfactual (no-policy) death rate, now multiplied by housing-dependent death rate multiplier (unsheltered=2.5×, precarious=1.3×, sheltered=1.0×). For sheltered unprotected agents at Current policies (policyMortMult=0.81), the effective rate is ~0.0000011, which combined with nighttime mortality and all gap-fix multipliers produces ~577 population-scaled deaths/yr at moderate + 2023. Unsheltered agents face 2.5× this base rate in the death zone, reflecting the 200–300× relative risk documented in the MAP AZ Dashboard White Paper. [38]"},
{name:"baseFracDeathRate (blackout)",val:"0.00000295 × housingDeathMult × suscDeathMult per agent-tick",note:"2.5× normal rate (0.00000118 × 2.5) during grid failure events, further multiplied by housingDeathMult. During blackout, sheltered agents also lose AC recovery and behave like precarious agents. [17,38]"},
{name:"policyMortMult",val:"(1−E_cool)×(1−E_hyd)×(1−E_out)  [Hill dose-response]",note:"Population-wide policy modifier applied ONLY to agents not currently receiving spatial protection (protection=1.0). Uses coverage-based Hill dose-response per intervention with multiplicative combination. Each E(c) = Emax·c^n/(K^n+c^n) converts district-level service coverage into mortality reduction with diminishing returns. At Current tier (all=1): ~0.81. Spatially-protected agents already benefit from reduced heat accumulation — applying policyMortMult on top would double-count."},
{name:"fracDeathRate",val:"baseFracDeathRate × (spatiallyProtected ? 1.0 : policyMortMult)",note:"Effective fractional death rate per agent-tick in the critical zone. Spatially-protected agents (near infrastructure, protection<1.0) receive the full baseFracDeathRate since their protection is already applied upstream via reduced heat accumulation. Unprotected agents (protection=1.0) receive the policyMortMult discount. Accumulated across all agents each tick to produce fractionalDeaths, then multiplied by popScale for population-level estimates."},
{name:"visualDeathProb",val:"fracDeathRate × VISUAL_DEATH_SCALE (20×)",note:"Visual death probability for agent dots is now derived directly from the same fracDeathRate used for population-scaled estimates, multiplied by VISUAL_DEATH_SCALE=20 so a visible number of dots die during severe scenarios. This replaces the prior independent baseVisualDeath constants (0.00015 day / 0.00008 night) that only varied by housing and blackout. The unified approach ensures every modifier — housing tier, susceptibility, policy interventions, blackout, spatial protection, and outreach rescue — is reflected in which agents visually die on screen, eliminating the interpretive disconnect between displayed dot deaths and the reported death count."},
{name:"fracRescueRate",val:"rescueChance × 0.008",note:"Fractional rescue accumulation rate. rescueChance=0.3 for outreach-visited agents in the critical zone."},
{name:"gridStrain",val:"cumulative, 0–15",note:"Sim-level variable tracking multi-day thermal degradation of grid infrastructure. Increases daily by (Tmax−95)/20 + (Tmin−75)/25×0.5 on days ≥95°F. Decays 30% per cool day. Models transformer fatigue, feeder thermal limits, and substation stress that compound over multi-week heat events. [17,18]"},
{name:"consecutiveHotDays",val:"0+",note:"Running count of consecutive days with Tmax ≥100°F. Resets to 0 when daily max drops below 100°F. Drives the heatwave-duration component of the logistic blackout multiplier. [17]"},
{name:"blackoutDaysRemaining",val:"0–6",note:"Counter tracking remaining days of an ongoing blackout event. When a new blackout triggers, set to min(7, max(1,⌈gridStrain/4⌉) + Geometric(p=0.5)) − 1. Decremented each tick during ongoing blackout (no new onset roll while >0). The strain-dependent floor ensures severe heat domes produce longer outages; the geometric tail adds stochastic restoration variation. [17,47,48]"},
{name:"logistic grid multiplier",val:"1 + 9/(1+exp(−8·(S−0.45)))",note:"S = 0.35·tempExcess + 0.20·nightExcess + 0.25·durationFactor + 0.20·strainFactor. tempExcess = max(0,Tmax−100)/15; nightExcess = max(0,Tmin−78)/15; durationFactor = max(0,consecutiveHotDays−1)/6; strainFactor = min(1,gridStrain/8). Multiplier ranges from ~1× (single mild hot day) to ~10× (multi-day extreme heat dome with accumulated strain). Applied to the user-set base probability. [17,18]"},
{name:"gridFailure (default)",val:"0.083%",note:"Base daily blackout probability, derived from NERC LOLE planning criterion of 1 day in 10 years. This base rate is dynamically amplified ×1–10 by a logistic function of Tmax, Tmin, heatwave duration, and cumulative grid strain. Effective daily probability during a 7-day 115°F heat dome can reach ~0.8%. [18]"},
