function project(scenario,year){
  const s=SCENARIOS[scenario];
  const f=Math.max(0,(year-2020)/80);
  return MONTHS.map((m,i)=>({
    month:m,
    high:+(BASE.high[i]+s.tempD*f).toFixed(1),
    low:+(BASE.low[i]+s.tempD*f).toFixed(1),
    precip:+(Math.max(0,BASE.precip[i]*(1+s.precipD*f))).toFixed(2),
    sun:BASE.sun[i],
    heat:Math.min(31,Math.round(BASE.heat[i]*(1+f*(s.tempD/3.5)))),
  }));
}

const ChartTip=({active,payload,label})=>{
  if(!active||!payload||!payload.length)return null;
  return React.createElement('div',{style:{background:"#ffffff",border:"1px solid #6B1530",borderRadius:8,padding:"10px 14px",fontSize:16,color:"#1A0A10"}},
    React.createElement('div',{style:{color:"#8C1D40",fontWeight:700,marginBottom:4}},label),
    payload.map((p,i)=>React.createElement('div',{key:i,style:{color:p.color}},p.name,": ",React.createElement('b',null,p.value,p.unit||"")))
  );
};

      value,React.createElement('span',{style:{fontSize:16,color:"#7A3045",marginLeft:3}},unit)

}

function DriversPanel(){
  const drivers=[
    {name:"Solar Radiation",pct:40,color:"#FFC627",desc:"The Sonoran Desert receives intense solar insolation year-round due to its low latitude and minimal cloud cover."},
    {name:"Greenhouse Gases",pct:30,color:"#ef4444",desc:"CO₂, methane, and nitrous oxide trap outgoing longwave radiation, amplifying the natural greenhouse effect."},
    {name:"Urban Development",pct:20,color:"#8C1D40",desc:"Impervious surfaces, waste heat from A/C and vehicles, and reduced vegetation all add to localized warming."},
    {name:"Monsoon Variability",pct:10,color:"#FFC627",desc:"The North American Monsoon (July–September) delivers ~50% of Phoenix's annual rain but is becoming less reliable."},
  ];
  return React.createElement('div',null,
    React.createElement(SectionHead,null,"What Drives Phoenix Heat?"),
    React.createElement('p',{style:prose},"Phoenix's extreme heat results from several interacting forces. Understanding each driver helps us predict how the climate will respond to both natural variation and human intervention."),

      React.createElement('div',{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
        React.createElement('span',{style:{color:"#1A0A10",fontSize:17,fontWeight:600}},d.name),

      React.createElement('div',{style:{background:"#F0E8EB",borderRadius:6,height:8,marginBottom:8}},
        React.createElement('div',{style:{background:`linear-gradient(90deg,${d.color},${d.color}88)`,width:`${d.pct}%`,height:"100%",borderRadius:6}})

    )),
    React.createElement(KeyConcept,{term:"Feedback Loops",color:"#ef4444"},"As Phoenix warms, more A/C is used → more electricity is burned → more heat & CO₂ is released → further warming. This is a positive feedback loop.")

}

function ImpactsPanel({scenario,year}){
  const data=project(scenario,year);
  const s=SCENARIOS[scenario];
  const totalHeat=data.reduce((a,d)=>a+d.heat,0);
  const annualPrecip=data.reduce((a,d)=>a+d.precip,0).toFixed(2);
  const warming=(SCENARIOS[scenario].tempD*Math.max(0,(year-2020)/80)).toFixed(1);
  const totalSun=data.reduce((a,d)=>a+d.sun,0);
  const impacts=[
    {cat:"🏥 Public Health",color:"#ef4444",items:[`${totalHeat} days/year above 110°F — physiological limit for outdoor safety`,"Heat stroke risk rises exponentially above 105°F wet-bulb temperature","Elderly, children & outdoor workers face greatest mortality risk","Phoenix heat deaths have doubled since 2010"]},
    {cat:"💧 Water Security",color:"#8C1D40",items:[`Annual precip projects to ${annualPrecip}" — below already-critical baseline`,"Colorado River supplies 36% of Phoenix's water; Lake Mead at historic lows","Groundwater overdraft accelerating as surface water declines","Agricultural irrigation (70% of water use) under severe pressure"]},
    {cat:"⚡ Energy Demand",color:"#8C1D40",items:["A/C accounts for ~70% of summer electricity use in Phoenix homes","Each 1°F rise increases peak demand by ~2% — grid strain compounds","Power outages during heat waves become life-threatening events",`Solar opportunity: ${totalSun.toLocaleString()} sunshine hrs/yr`]},
  ];
  return React.createElement('div',null,
    React.createElement(SectionHead,null,"Real-World Consequences"),
    React.createElement('p',{style:prose},"Climate projections aren't abstract numbers — they translate directly into human, ecological, and infrastructural impacts. Here's what the ",React.createElement('strong',{style:{color:s.color}},s.label)," scenario means for Phoenix in ",year,":"),
    React.createElement('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:24}},
      React.createElement(StatCard,{label:"Days >110°F",value:totalHeat,unit:"days",color:"#ef4444",accent:true}),
      React.createElement(StatCard,{label:"Annual Rainfall",value:annualPrecip,unit:'"',color:"#2E86C1",accent:true}),
      React.createElement(StatCard,{label:"Projected Warming",value:"+"+warming,unit:"°F",color:s.color,accent:true})

// ── MORTALITY ESTIMATOR ──────────────────────────────────────────────────────
// Model basis:
//   Maricopa County recorded ~645 heat deaths in 2023 (baseline ~500/yr avg)
//   Base rate: ~425 deaths/yr at 2020 baseline (107 days >100°F)
//   Each additional day >110°F adds ~3.2 deaths (from Maricopa County data)
//   Each additional °F mean warming multiplies base rate by 1.04
//   Policy interventions reduce mortality by modeled percentages from literature
function MortalityPanel({scenario:globalScenario,year:globalYear}){
  const[coolingCenters,setCoolingCenters]=useState(0);
  const[hydrationStations,setHydrationStations]=useState(0);
  const[outreach,setOutreach]=useState(0);
  const[localScenario,setLocalScenario]=useState(globalScenario||"moderate");
  const[localYear,setLocalYear]=useState(globalYear||2024);

  // Keep local scenario in sync if user navigates away and back
  React.useEffect(()=>{setLocalScenario(globalScenario);},[globalScenario]);
  React.useEffect(()=>{setLocalYear(globalYear);},[globalYear]);

  // Use local (slide-specific) scenario & year — these are outputs of the climate model
  const scenario=localScenario;
  const year=localYear;

  const data=project(scenario,year);
  const s=SCENARIOS[scenario];
  const totalHeatDays=data.reduce((a,d)=>a+d.heat,0);
  // Mean summer high temperature from the climate model (Jun–Sep average)
  const summerHighAvg=(data[5].high+data[6].high+data[7].high+data[8].high)/4;
  const warming=(s.tempD*Math.max(0,(year-2020)/80));

  // Base mortality model
  const BASE_DEATHS_2020=425;
  const BASE_HEAT_DAYS_2020=104;
  const additionalHeatDays=Math.max(0,totalHeatDays-BASE_HEAT_DAYS_2020);
  const warmingMultiplier=Math.pow(1.04,warming);
  const rawDeaths=Math.round((BASE_DEATHS_2020+additionalHeatDays*3.2)*warmingMultiplier);

  // Policy reductions (evidence-based estimates from public health literature)
  // Cooling centers: ~8% reduction per tier (each tier = +50 centers, 24hr access)
  // Hydration stations: ~4% reduction per tier (each tier = +200 stations)
  // Outreach programs: ~6% reduction per tier (targeted vulnerable population outreach)
  const coolingReduction=coolingCenters*0.08;
  const hydrationReduction=hydrationStations*0.04;
  const outreachReduction=outreach*0.06;
  const totalReductionPct=Math.min(0.65,coolingReduction+hydrationReduction+outreachReduction);
  const preventedDeaths=Math.round(rawDeaths*totalReductionPct);
  const finalDeaths=rawDeaths-preventedDeaths;

  // Cost estimates
  const coolingCost=[0,2.1,4.8,9.2][coolingCenters]; // $M/yr
  const hydrationCost=[0,0.4,0.9,1.8][hydrationStations];
  const outreachCost=[0,1.2,2.6,4.5][outreach];
  const totalCost=(coolingCost+hydrationCost+outreachCost).toFixed(1);
  const costPerLifeSaved=preventedDeaths>0?(((coolingCost+hydrationCost+outreachCost)*1000000)/preventedDeaths/1000).toFixed(0):"—";

  const riskLevel=finalDeaths<300?"Low":finalDeaths<500?"Moderate":finalDeaths<700?"High":"Critical";
  const riskColor=finalDeaths<300?"#10b981":finalDeaths<500?"#FFC627":finalDeaths<700?"#FFC627":"#ef4444";

  // Chart data — monthly distribution of deaths (proportional to heat days)
  const totalHeatForDist=data.reduce((a,d)=>a+d.heat,0)||1;
  const monthlyDeaths=data.map(d=>({
    month:d.month,
    baseline:Math.round((d.heat/totalHeatForDist)*rawDeaths),
    withPolicy:Math.round((d.heat/totalHeatForDist)*finalDeaths),
  }));

  const POLICY_LABELS={
    coolingCenters:["None","50 centers (+$2.1M/yr)","150 centers (+$4.8M/yr)","300 centers (+$9.2M/yr)"],
    hydrationStations:["None","200 stations (+$0.4M/yr)","500 stations (+$0.9M/yr)","1,000 stations (+$1.8M/yr)"],
    outreach:["None","Basic outreach (+$1.2M/yr)","Expanded program (+$2.6M/yr)","Comprehensive (+$4.5M/yr)"],
  };

  return React.createElement('div',null,
    // Header badge
    React.createElement('div',{style:{display:"flex",alignItems:"center",gap:10,marginBottom:16,padding:"10px 14px",background:"rgba(239,68,68,0.08)",border:"1px solid #ef444433",borderRadius:8}},
      React.createElement('span',{style:{fontSize:20}},"📉"),
      React.createElement('span',{style:{color:"#ef4444",fontSize:16,letterSpacing:"2px",textTransform:"uppercase",fontWeight:600}},"Heat Mortality Estimator · Phoenix, AZ")
    ),

    // ── Climate Scenario Selector ──────────────────────────────────────────
    React.createElement('div',{style:{marginBottom:22,padding:"16px 18px",background:"rgba(140,29,64,0.06)",border:"1px solid #8C1D4033",borderRadius:12}},
      React.createElement('div',{style:{fontSize:13,color:"#7A3045",letterSpacing:"3px",textTransform:"uppercase",fontWeight:700,marginBottom:10}},"Climate Scenario — drives temperature & heat-day inputs below"),
      React.createElement('div',{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}},
        ...Object.entries(SCENARIOS).map(([key,sc])=>

// ── AGENT-BASED MODEL ────────────────────────────────────────────────────────
function ABMPanel({scenario:globalScenario,year:globalYear}){
  const canvasRef=React.useRef(null);
  const mapDivRef=React.useRef(null);
  const leafletMapRef=React.useRef(null);
  const simRef=React.useRef(null);
  const animRef=React.useRef(null);
  const[running,setRunning]=useState(false);
  const[tick,setTick]=useState(0);
  const[stats,setStats]=useState({healthy:0,stressed:0,critical:0,dead:0,saved:0});
  const[coolingCenters,setCoolingCenters]=useState(1);
  const[hydrationStations,setHydrationStations]=useState(1);
  const[outreach,setOutreach]=useState(0);
  const[localScenario,setLocalScenario]=useState(globalScenario||"moderate");
  const[simYear,setSimYear]=useState(typeof globalYear==="number"?globalYear:2024);
  const[speed,setSpeed]=useState(1);
  const[numAgents,setNumAgents]=useState(100);

  // Sync scenario from sidebar; year is independent on this slide
  React.useEffect(()=>{setLocalScenario(globalScenario);},[globalScenario]);

  // Convenience alias
  const scenario=localScenario;

  const W=640, H=440;

  // Phoenix GIS districts — approximate polygons as {x,y,w,h,name,heatBias}
  // Based on real Phoenix grid layout (downtown=hottest, suburbs=cooler)
  const DISTRICTS=[
    {x:250,y:160,w:90,h:70,name:"Downtown",heatBias:1.25,color:"rgba(239,68,68,0.18)"},
    {x:190,y:120,w:70,h:60,name:"West Phoenix",heatBias:1.1,color:"rgba(249,115,22,0.12)"},
    {x:340,y:140,w:80,h:65,name:"Tempe",heatBias:1.15,color:"rgba(249,115,22,0.12)"},
    {x:160,y:200,w:80,h:70,name:"South Mtn",heatBias:0.9,color:"rgba(16,185,129,0.1)"},
    {x:340,y:210,w:85,h:65,name:"Chandler",heatBias:1.0,color:"rgba(245,158,11,0.1)"},
    {x:250,y:80,w:85,h:70,name:"North Phoenix",heatBias:0.85,color:"rgba(255,198,39,0.1)"},
    {x:400,y:80,w:90,h:70,name:"Scottsdale",heatBias:0.95,color:"rgba(255,198,39,0.1)"},
    {x:130,y:140,w:65,h:60,name:"Avondale",heatBias:1.05,color:"rgba(245,158,11,0.1)"},
    {x:420,y:200,w:75,h:60,name:"Mesa",heatBias:1.08,color:"rgba(249,115,22,0.1)"},
    {x:280,y:270,w:80,h:55,name:"Laveen",heatBias:0.88,color:"rgba(16,185,129,0.1)"},
  ];

  // Roads (simplified Phoenix grid)
  const ROADS=[
    // Major E-W
    {x1:100,y1:100,x2:550,y2:100},{x1:100,y1:160,x2:550,y2:160},
    {x1:100,y1:230,x2:550,y2:230},{x1:100,y1:290,x2:550,y2:290},
    {x1:100,y1:340,x2:550,y2:340},
    // Major N-S
    {x1:160,y1:60,x2:160,y2:380},{x1:230,y1:60,x2:230,y2:380},
    {x1:300,y1:60,x2:300,y2:380},{x1:370,y1:60,x2:370,y2:380},
    {x1:440,y1:60,x2:440,y2:380},{x1:510,y1:60,x2:510,y2:380},
  ];

  // ── Initialize Leaflet map ─────────────────────────────────────
  useEffect(()=>{
    if(!mapDivRef.current||leafletMapRef.current) return;
    const L=window.L;
    if(!L) return;

    // Phoenix metro bounds: SW corner to NE corner
    const bounds=L.latLngBounds([[33.25,-112.55],[33.76,-111.62]]);
    const map=L.map(mapDivRef.current,{
      center:[33.46,-112.07],
      zoom:11,
      zoomControl:false,
      attributionControl:true,
      scrollWheelZoom:false,
      dragging:false,
      doubleClickZoom:false,
      touchZoom:false,
    });

    // OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom:19,
    }).addTo(map);

    // Fit to Phoenix metro
    map.fitBounds(bounds,{animate:false});

    // Load official Phoenix city boundary from City of Phoenix GIS REST service
    fetch('https://maps.phoenix.gov/pub/rest/services/Public/CityBoundary/MapServer/0/query?where=1%3D1&outSR=4326&f=geojson')
      .then(r=>r.json())
      .then(data=>{
        L.geoJSON(data,{
          style:{
            color:'#8C1D40',
            weight:2.5,
            opacity:0.9,
            fillColor:'#FFC627',
            fillOpacity:0.04,
            dashArray:'6 4',
          }
        }).addTo(map);
      })
      .catch(()=>{
        // Fallback: draw approximate city boundary polygon if CORS blocks
        const phoenixBoundary=[
          [33.75,-112.35],[33.74,-112.09],[33.73,-111.88],[33.68,-111.72],
          [33.60,-111.72],[33.52,-111.73],[33.44,-111.78],[33.36,-111.87],
          [33.28,-112.04],[33.25,-112.17],[33.28,-112.35],[33.35,-112.49],
          [33.44,-112.54],[33.56,-112.55],[33.67,-112.49],[33.75,-112.35]
        ];
        L.polygon(phoenixBoundary,{
          color:'#8C1D40',weight:2.5,opacity:0.9,
          fillColor:'#FFC627',fillOpacity:0.04,dashArray:'6 4'
        }).bindTooltip('Phoenix City Limits',{permanent:false,direction:'center',className:'phoenix-boundary-tip'}).addTo(map);
      });

    leafletMapRef.current=map;
    return()=>{ map.remove(); leafletMapRef.current=null; };
  },[]);

  // ── Calendar helpers ───────────────────────────────────────────
  function isLeapYear(y){ return y%4===0&&(y%100!==0||y%400===0); }
  function daysInYear(y){ return isLeapYear(y)?366:365; }
  function getDaysPerMonth(y){
    return[31,isLeapYear(y)?29:28,31,30,31,30,31,31,30,31,30,31];
  }
  // Day-of-year (0-indexed) → interpolated daily high °F from climate model
  function dayToTemp(day,climateMonthlyHighs){
    const dpm=getDaysPerMonth(simYear);
    // Build cumulative mid-month day positions for smoother interpolation
    let cumulative=0;
    const midpoints=dpm.map((d,i)=>{const mid=cumulative+d/2;cumulative+=d;return mid;});
    // Wrap-around: compare against prev Dec and next Jan
    const highs=[...climateMonthlyHighs,climateMonthlyHighs[0]];
    const mids=[midpoints[11]-daysInYear(simYear),...midpoints,midpoints[0]+daysInYear(simYear)];
    // Find bracketing months
    for(let i=0;i<mids.length-1;i++){
      if(day>=mids[i]&&day<mids[i+1]){
        const t=(day-mids[i])/(mids[i+1]-mids[i]);
        const h0=i===0?climateMonthlyHighs[11]:highs[i-1+1];
        const h1=highs[i+1];
        return h0+(h1-h0)*t;
      }
    }
    return climateMonthlyHighs[0];
  }
  // Approximate calendar date label from day-of-year
  function dayToDateLabel(day){
    const dpm=getDaysPerMonth(simYear);
    const mnames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    let cum=0;
    for(let m=0;m<12;m++){if(day<cum+dpm[m])return mnames[m]+" "+(day-cum+1);cum+=dpm[m];}
    return "Dec 31";
  }

  function buildSim(){
    // Build full seasonal temperature array from climate model for simYear
    const climateData=project(scenario,simYear);
    const monthlyHighs=climateData.map(d=>d.high);
    const startTemp=dayToTemp(0,monthlyHighs); // Jan 1 temperature

    // Generate cooling center locations
    const coolingLocs=[];
    const ccPositions=[[300,160],[230,230],[370,230],[300,100],[440,160]];
    for(let i=0;i<coolingCenters*2&&i<ccPositions.length;i++) coolingLocs.push({x:ccPositions[i][0],y:ccPositions[i][1],r:30});

    // Hydration station locations
    const hydLocs=[];
    const hPositions=[[230,160],[370,160],[160,230],[440,230],[300,290],[230,100],[440,100],[160,160],[510,200],[300,340]];
    for(let i=0;i<hydrationStations*3&&i<hPositions.length;i++) hydLocs.push({x:hPositions[i][0],y:hPositions[i][1],r:20});

    // Generate agents
    const agents=[];
    const N=numAgents;
    for(let i=0;i<N;i++){
      // Pick random district, weighted by population density
      const d=DISTRICTS[Math.floor(Math.random()*DISTRICTS.length)];
      const vulnerable=Math.random()<0.25; // 25% elderly/at-risk
      agents.push({
        id:i,
        x:d.x+Math.random()*d.w,
        y:d.y+Math.random()*d.h,
        vx:(Math.random()-0.5)*0.4,
        vy:(Math.random()-0.5)*0.4,
        state:"healthy", // healthy|stressed|critical|dead|saved
        heat:0,
        vulnerable,
        homeX:d.x+Math.random()*d.w,
        homeY:d.y+Math.random()*d.h,
        district:d,
        outreachVisited:false,
      });
    }

    return{agents,coolingLocs,hydLocs,baseTemp:startTemp,monthlyHighs,tick:0,deaths:0,saved:0};
  }

  function stepSim(sim){
    // Each tick = 1 day of the year. Compute today's temperature from climate model.
    const day=sim.tick; // 0-indexed day of year
    const monthlyHighs=sim.monthlyHighs||project(scenario,simYear).map(d=>d.high);
    const dailyTemp=dayToTemp(day,monthlyHighs); // seasonal interpolation
    const{agents,coolingLocs,hydLocs}=sim;
    const outreachRange=outreach>0?80*outreach:0;
    const outreachCenter={x:300,y:220};

    let healthy=0,stressed=0,critical=0,dead=0,saved=0;

    agents.forEach(a=>{
      if(a.state==="dead") return;

      // Movement
      a.x+=a.vx+(Math.random()-0.5)*0.3;
      a.y+=a.vy+(Math.random()-0.5)*0.3;
      if(a.x<80){a.x=80;a.vx*=-1;}
      if(a.x>560){a.x=560;a.vx*=-1;}
      if(a.y<60){a.y=60;a.vy*=-1;}
      if(a.y>390){a.y=390;a.vy*=-1;}

      // District heat bias applied to today's temperature
      let localHeat=dailyTemp;
      DISTRICTS.forEach(d=>{
        if(a.x>d.x&&a.x<d.x+d.w&&a.y>d.y&&a.y<d.y+d.h) localHeat*=d.heatBias;
      });

      // Cooling centers
      let inCooling=false;
      coolingLocs.forEach(c=>{
        const dx=a.x-c.x,dy=a.y-c.y;
        if(Math.sqrt(dx*dx+dy*dy)<c.r) inCooling=true;
      });

      // Hydration stations
      let inHydration=false;
      hydLocs.forEach(h=>{
        const dx=a.x-h.x,dy=a.y-h.y;
        if(Math.sqrt(dx*dx+dy*dy)<h.r) inHydration=true;
      });

      // Outreach
      let outreachHelped=false;
      if(outreach>0&&a.vulnerable&&!a.outreachVisited){
        const dx=a.x-outreachCenter.x,dy=a.y-outreachCenter.y;
        if(Math.sqrt(dx*dx+dy*dy)<outreachRange&&Math.random()<0.002*outreach) outreachHelped=true;
        if(outreachHelped) a.outreachVisited=true;
      }

      // Heat accumulation — daily. On cool days (<85°F) heat dissipates slightly.
      const protection=inCooling?0.05:inHydration?0.4:outreachHelped?0.3:1.0;
      const vulnerabilityMult=a.vulnerable?1.6:1.0;
      if(inCooling){
        a.heat=Math.max(0,a.heat-0.005);
      } else if(localHeat>=85){
        const heatRate=((localHeat-85)/50)*0.008*protection*vulnerabilityMult;
        a.heat=Math.min(1,a.heat+heatRate);
      } else {
        // Cool day — gradual recovery
        a.heat=Math.max(0,a.heat-0.003);
      }

      // State machine
      if(a.state==="saved"){saved++;return;}
      if(a.heat<0.3){a.state="healthy";}
      else if(a.heat<0.65){a.state="stressed";}
      else if(a.heat<0.9){a.state="critical";}
      else{
        const rescueChance=(outreachHelped||a.outreachVisited)?0.3:0;
        if(Math.random()<rescueChance){a.state="saved";a.heat=0.2;saved++;}
        else if(Math.random()<0.002){a.state="dead";} // lower daily death probability
        else{a.state="critical";}
      }

      if(a.state==="healthy") healthy++;
      else if(a.state==="stressed") stressed++;
      else if(a.state==="critical") critical++;
      else if(a.state==="dead") dead++;
    });

    return{...sim,baseTemp:dailyTemp,tick:sim.tick+1,stats:{healthy,stressed,critical,dead,saved}};
  }

  function drawFrame(ctx,sim){
    ctx.clearRect(0,0,W,H);

    // Canvas is transparent — Leaflet map shows through as base layer

    // District fills (semi-transparent heat overlays)
    DISTRICTS.forEach(d=>{
      ctx.fillStyle=d.color;
      ctx.fillRect(d.x,d.y,d.w,d.h);
      ctx.strokeStyle="rgba(140,29,64,0.35)";
      ctx.lineWidth=1;
      ctx.strokeRect(d.x,d.y,d.w,d.h);
      // Label with background for legibility over map tiles
      ctx.font="bold 8px Arial";
      const tw=ctx.measureText(d.name).width;
      ctx.fillStyle="rgba(255,255,255,0.75)";
      ctx.fillRect(d.x+2,d.y+2,tw+4,12);
      ctx.fillStyle="rgba(80,20,40,0.9)";
      ctx.fillText(d.name,d.x+4,d.y+11);
    });

    // Heat overlay based on temperature
    const temp=sim.baseTemp||105;
    const heatAlpha=Math.min(0.35,Math.max(0,(temp-100)/80));
    const grad=ctx.createRadialGradient(300,220,20,300,220,260);
    grad.addColorStop(0,`rgba(239,68,68,${heatAlpha})`);
    grad.addColorStop(0.5,`rgba(249,115,22,${heatAlpha*0.5})`);
    grad.addColorStop(1,"rgba(239,68,68,0)");
    ctx.fillStyle=grad;
    ctx.fillRect(80,50,W-100,H-80);

    // Hydration stations
    sim.hydLocs&&sim.hydLocs.forEach(h=>{
      ctx.beginPath();ctx.arc(h.x,h.y,h.r,0,Math.PI*2);
      ctx.strokeStyle="rgba(255,198,39,0.4)";ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle="rgba(255,198,39,0.08)";ctx.fill();
      ctx.fillStyle="#FFC627";ctx.font="bold 10px Georgia";
      ctx.fillText("💧",h.x-5,h.y+4);
    });

    // Cooling centers
    sim.coolingLocs&&sim.coolingLocs.forEach(c=>{
      ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
      ctx.strokeStyle="rgba(140,29,64,0.5)";ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle="rgba(140,29,64,0.1)";ctx.fill();
      ctx.fillStyle="#8C1D40";ctx.font="bold 11px Georgia";
      ctx.fillText("🏢",c.x-7,c.y+4);
    });

    // Outreach radius indicator
    if(outreach>0){
      ctx.beginPath();ctx.arc(300,220,80*outreach,0,Math.PI*2);
      ctx.strokeStyle="rgba(16,185,129,0.25)";ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle="rgba(16,185,129,0.05)";ctx.fill();
    }

    // Agents
    const COLORS={healthy:"#10b981",stressed:"#FFC627",critical:"#ef4444",dead:"#7A3045",saved:"#FFD966"};
    sim.agents&&sim.agents.forEach(a=>{
      const col=COLORS[a.state]||"#10b981";
      const r=a.vulnerable?4:3;
      ctx.beginPath();ctx.arc(a.x,a.y,r,0,Math.PI*2);
      ctx.fillStyle=col;ctx.fill();
      if(a.vulnerable&&a.state!=="dead"){
        ctx.strokeStyle=col;ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(a.x,a.y,r+2,0,Math.PI*2);ctx.stroke();
      }
      if(a.state==="dead"){
        ctx.strokeStyle="#7A3045";ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(a.x-2,a.y-2);ctx.lineTo(a.x+2,a.y+2);ctx.stroke();
        ctx.beginPath();ctx.moveTo(a.x+2,a.y-2);ctx.lineTo(a.x-2,a.y+2);ctx.stroke();
      }
    });

    // Compass rose
    ctx.fillStyle="rgba(100,116,139,0.6)";ctx.font="9px Georgia";
    ctx.fillText("N↑",W-30,75);ctx.fillText("Phoenix AZ",W-90,H-15);

    // Temperature overlay badge
    ctx.fillStyle="rgba(26,10,16,0.8)";
    ctx.fillRect(85,55,110,20);
    ctx.fillStyle=temp>115?"#ef4444":temp>110?"#FFC627":"#10b981";
    ctx.font="bold 11px Georgia";
    const dayLabel=dayToDateLabel(Math.max(0,(sim.tick||1)-1));
    ctx.fillText(`${simYear} · ${dayLabel} · ${temp.toFixed(1)}°F`,90,68);
  }

  // Init simulation
